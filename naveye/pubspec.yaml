name: naveye
description: "NavEye - AI-based Assistance System for Blind People"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.10.5+9

  # AI / Object Detection
  onnxruntime: ^1.4.1
  image: ^4.1.7

  # Text to Speech
  flutter_tts: ^4.0.2

  # Local Database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # Face Detection (ML Kit)
  google_mlkit_face_detection: ^0.11.0

  # Voice Commands (STT)
  speech_to_text: ^7.0.0

  # Preferences
  shared_preferences: ^2.2.3

  # Permissions
  permission_handler: ^11.3.1

  # Vibration
  vibration: ^2.0.0

  # Background foreground service (keeps detection running when screen locks)
  flutter_foreground_task: ^8.13.0

  # Battery level monitoring
  battery_plus: ^6.0.3

  # Network connectivity monitoring
  connectivity_plus: ^6.0.5

  # Sensors (accelerometer for fall detection, magnetometer for compass)
  sensors_plus: ^4.0.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A14"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/images/